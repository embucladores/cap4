<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rivalidad - Capítulo 4</title>
<link rel="icon" type="image/png" href="1000014982.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Variables y Reset */
* { margin:0; padding:0; box-sizing:border-box; }

/* Solo mostrar cursor personalizado en dispositivos con puntero (PC) */
@media (pointer: fine) {
    * { cursor: none !important; }
}

:root {
  --viajero-color: #ff6600; 
  --viajero-glow: #ffae00;
  --white-rival: #ffffff;
  --white-glow: #e0e0e0;
  --cel:#5bb8e8; --cel-glow:#a0d8f5;
  --gold:#c9a227; --gold-glow:#ffe066;
  --font: 'Orbitron', sans-serif;
}

html, body { 
  min-height: 100%; 
  font-family: var(--font); 
  background: #06070e url('1000014974.jpg') no-repeat center center fixed; 
  background-size: cover;
  color: #ccc; 
  /* Permitir scroll en móvil */
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-user-select: none; 
  user-select: none;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.6);
  z-index: 1;
}

/* --- MENÚ DE INICIO --- */
#startup-menu {
  position: fixed;
  inset: 0;
  z-index: 20000;
  background: #06070e url('1000014974.jpg') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: transform 0.8s ease-in-out, opacity 0.5s;
}

#startup-menu::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  z-index: -1;
}

.menu-content { text-align: center; padding: 20px; }

.menu-logo-big {
  max-width: 80%;
  height: auto;
  margin-bottom: 30px;
  filter: drop-shadow(0 0 15px var(--gold-glow));
  animation: pulseLogo 3s infinite ease-in-out;
}

.start-btn {
  padding: 15px 30px;
  font-family: var(--font);
  font-size: 1rem;
  color: #000;
  background: var(--gold);
  border: none;
  border-radius: 4px;
  letter-spacing: 2px;
  text-transform: uppercase;
  box-shadow: 0 0 20px rgba(201, 162, 39, 0.5);
}

.menu-hidden { transform: translateY(-100%) !important; opacity: 0; pointer-events: none; }

/* CURSOR (Oculto en móvil) */
#custom-cursor {
  position: fixed;
  width: 25px; height: 25px;
  border: 2px solid var(--gold);
  border-radius: 50%;
  pointer-events: none;
  z-index: 30000;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px var(--gold-glow);
  display: none; /* Se activa por JS solo si hay ratón */
}

#canvas{ position:fixed; inset:0; pointer-events:none; z-index:2; }

.page{ 
  position:relative; 
  z-index:3; 
  width: 100%;
  padding: 80px 15px 40px; 
}

.main-card{
  width:100%; 
  max-width:1100px;
  margin: 0 auto;
  background: rgba(8, 9, 18, 0.7); 
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  backdrop-filter:blur(15px);
  overflow:hidden;
}

.card-header { text-align: center; padding: 30px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.top-logo-img { height: 50px; width: auto; margin-bottom: 15px; }

.main-title{ 
    font-size: clamp(1.2rem, 6vw, 2.5rem); 
    line-height: 1.2;
    margin-bottom: 10px;
    background: linear-gradient(135deg,#fff,var(--gold-glow),#fff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}

.main-subtitle { font-size: 0.75rem; color: #aaa; line-height: 1.5; }

.voto-subtitle { 
    font-size: 0.8rem; 
    color: var(--cel-glow); 
    padding: 20px; 
    text-align: center; 
    text-transform: uppercase;
}

/* Grid Responsiva: 1 columna en móvil, 3 en PC */
.fighters {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  padding: 0 15px 30px;
}

@media (min-width: 992px) {
    .fighters {
        grid-template-columns: 1fr 1fr 1fr;
        gap: 0;
    }
    .vs-divider { display: flex; }
    #custom-cursor { display: block; }
}

.fighter { 
    padding: 20px; 
    display: flex; 
    flex-direction: column; 
    align-items: center;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
}

.vs-divider { display: none; align-items: center; justify-content: center; color: var(--gold); opacity: 0.3; }

.img-container { 
    height: 180px; 
    width: 100%;
    display: flex; 
    align-items: center; 
    justify-content: center; 
    margin: 15px 0;
}
.img-container img { max-height: 100%; max-width: 100%; object-fit: contain; }

.fname { font-size: 1.1rem; margin-bottom: 10px; font-weight: bold; }
.finfo { font-size: 0.7rem; text-align: center; color: #889; margin-bottom: 20px; height: 40px; }

.btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 200px; }

.info-btn, .vote-btn {
  padding: 12px; font-family: var(--font); font-size: 0.65rem; letter-spacing: 1px;
  border: none; border-radius: 4px; width: 100%; text-transform: uppercase;
}

.vote-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
.viajero .info-btn { background: var(--viajero-color); color: #fff; }
.blanco .info-btn { background: #fff; color: #000; }
.rey .info-btn { background: var(--cel); color: #fff; }
.vote-btn.active { background: var(--gold) !important; color: #000 !important; }

/* MODAL RESPONSIVO */
.modal-overlay { 
  position: fixed; inset: 0; 
  background: rgba(0,0,0,0.95); 
  display: none; align-items: center; justify-content: center; 
  z-index: 30000; backdrop-filter: blur(10px); 
}
.modal-card { 
  width: 90%; max-width: 500px; 
  background: #0a0c14; border-radius: 12px; 
  flex-direction: column;
  position: relative; border: 1px solid rgba(255,255,255,0.2); 
  max-height: 90vh; overflow-y: auto;
}
@media (min-width: 768px) {
    .modal-card { flex-direction: row; max-width: 800px; }
}

.modal-left { padding: 20px; background: rgba(255,255,255,0.03); text-align: center; }
.modal-right { padding: 30px; }
.modal-img { max-height: 200px; width: auto; }
.modal-title { font-size: 1.5rem; margin-bottom: 15px; color: var(--theme-color); }
.modal-text { line-height: 1.6; font-size: 0.9rem; font-family: sans-serif; }

/* CONTROLES */
.menu-open-btn { position: fixed; top: 15px; left: 15px; z-index: 5000; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold); padding: 10px; border-radius: 4px; }
.music-control { position: fixed; bottom: 15px; right: 15px; width: 50px; height: 50px; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5000; color: var(--gold); }

.sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #080912; z-index: 25000; transition: 0.4s; padding: 40px 20px; border-right: 1px solid var(--gold); }
.sidebar.open { left: 0; }
</style>
</head>
<body>

<div id="startup-menu">
  <div class="menu-content">
    <img src="1000015002.png" alt="Logo Rivalidad" class="menu-logo-big">
    <br>
    <button class="start-btn" onclick="comenzarDuelo()">Empezar</button>
  </div>
</div>

<button class="menu-open-btn" onclick="toggleSidebar()">☰</button>

<div id="sidebar-overlay" onclick="toggleSidebar()" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:24000; display:none;"></div>
<div class="sidebar" id="sidebar">
    <div onclick="toggleSidebar()" style="text-align:right; font-size:2rem; margin-bottom:20px;">&times;</div>
    <h3 style="color:var(--gold); margin-bottom:20px;">Fondo</h3>
    <div class="bg-option" onclick="changeBackground('rivales', '1000014974.jpg')" style="padding:15px; border:1px solid #333; margin-bottom:10px; font-size:0.7rem;">RIVALES</div>
    <div class="bg-option" onclick="changeBackground('oscuridad', 'o.webp')" style="padding:15px; border:1px solid #333; margin-bottom:10px; font-size:0.7rem;">OSCURIDAD</div>
    <div class="bg-option" onclick="changeBackground('hielo', 'ff.jpg')" style="padding:15px; border:1px solid #333; margin-bottom:10px; font-size:0.7rem;">HIELO</div>
    <div class="bg-option" onclick="changeBackground('riqueza', 'rc.webp')" style="padding:15px; border:1px solid #333; margin-bottom:10px; font-size:0.7rem;">RIQUEZA</div>
</div>

<div id="custom-cursor"></div>
<canvas id="canvas"></canvas>

<audio id="bgMusic" loop><source src="rival.mp3" type="audio/mpeg"></audio>
<div class="music-control" onclick="toggleMusic()"><span id="music-icon">▶</span></div>

<div class="modal-overlay" id="modal" onclick="if(event.target == this) closeModal()">
  <div class="modal-card" id="modalCard">
    <div class="modal-left"><img src="" id="mImg" class="modal-img"></div>
    <div class="modal-right">
      <h2 id="mTitle" class="modal-title"></h2>
      <p id="mText" class="modal-text"></p>
      <button onclick="closeModal()" style="margin-top:20px; background:var(--gold); border:none; padding:10px 20px; font-family:var(--font); width:100%;">CERRAR</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="main-card">
    <div class="card-header">
      <img src="1000015002.png" alt="Icono Superior" class="top-logo-img">
      <h1 class="main-title">Rivalidad en Battlewood</h1>
      <p class="main-subtitle">El duelo por los fragmentos del Punto Cero.</p>
    </div>

    <p class="voto-subtitle">¿Quién ganará?</p>

    <div class="fighters">
      <div class="fighter viajero">
        <div class="fname" style="color:var(--viajero-glow)">Viajero Oscuro</div>
        <div class="img-container"><img src="1000014977.png"></div>
        <div class="finfo">Visitante malicioso de otro mundo.</div>
        <div class="btn-group">
            <button class="info-btn" onclick="openModal('viajero')">INFO</button>
            <button class="vote-btn" onclick="castVote(this)">VOTAR</button>
        </div>
      </div>

      <div class="vs-divider">VS</div>

      <div class="fighter blanco">
        <div class="fname" style="color:var(--white-glow)">Victor Chávez</div>
        <div class="img-container"><img src="1000014981.png"></div>
        <div class="finfo">Magnate de negocios turbios.</div>
        <div class="btn-group">
            <button class="info-btn" onclick="openModal('victor')">INFO</button>
            <button class="vote-btn" onclick="castVote(this)">VOTAR</button>
        </div>
      </div>

      <div class="vs-divider">VS</div>

      <div class="fighter rey">
        <div class="fname" style="color:var(--cel-glow)">Rey Helado</div>
        <div class="img-container"><img src="1000014978.png"></div>
        <div class="finfo">Soberano del Reino Helado.</div>
        <div class="btn-group">
            <button class="info-btn" onclick="openModal('rey')">INFO</button>
            <button class="vote-btn" onclick="castVote(this)">VOTAR</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const cursor = document.getElementById('custom-cursor');
document.addEventListener('mousemove', (e) => {
  if(cursor) {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  }
});

function comenzarDuelo() {
  document.getElementById('startup-menu').classList.add('menu-hidden');
  const music = document.getElementById('bgMusic');
  music.play().catch(() => console.log("Audio bloqueado"));
  document.getElementById('music-icon').innerText = '⏸';
}

function castVote(btn) {
  document.querySelectorAll('.vote-btn').forEach(b => {
    b.classList.remove('active');
    b.innerText = 'VOTAR';
  });
  btn.classList.add('active');
  btn.innerText = 'ELEGIDO';
}

const data = {
  viajero: { title: "Viajero Oscuro", img: "1000014977.png", color: "#ff6600", text: "Variante del Viajero del Universo Cero. Busca potenciar su nave con fragmentos del Punto Cero." },
  victor: { title: "Victor Chávez", img: "1000014981.png", color: "#ffffff", text: "Magnate que busca el Punto Cero para sanar su cuerpo afectado por la energía pura." },
  rey: { title: "Rey Helado", img: "1000014978.png", color: "#5bb8e8", text: "Malvado soberano que quiere el poder de los fragmentos para expandir su reino de hielo." }
};

function openModal(id) {
  const p = data[id];
  document.getElementById('mTitle').innerText = p.title;
  document.getElementById('mText').innerText = p.text;
  document.getElementById('mImg').src = p.img;
  document.getElementById('modalCard').style.setProperty('--theme-color', p.color);
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function toggleMusic() {
  const music = document.getElementById('bgMusic');
  const icon = document.getElementById('music-icon');
  if (music.paused) { music.play(); icon.innerText = '⏸'; }
  else { music.pause(); icon.innerText = '▶'; }
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  if(sb.classList.toggle('open')) ov.style.display = 'block';
  else ov.style.display = 'none';
}

function changeBackground(name, url) {
  document.body.style.backgroundImage = `url('${url}')`;
  toggleSidebar();
}

// Canvas simple
(function(){
  const c=document.getElementById('canvas'), ctx=c.getContext('2d');
  let W,H;
  function res(){ W=c.width=innerWidth; H=c.height=innerHeight; }
  window.onresize=res; res();
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle="rgba(255,255,255,0.1)";
    ctx.beginPath();
    ctx.arc(Math.random()*W, Math.random()*H, 1, 0, Math.PI*2);
    ctx.fill();
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
